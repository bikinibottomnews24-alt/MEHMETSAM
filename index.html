<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>MEHMET SAM | Okul Radyosu</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 50% 0%, #001a33 0%, #050505 60%, #000 100%);
        color: #fff;
        min-height: 100vh; min-height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 28px 44px;
        background: rgba(0,0,0,0.25);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 1.5px;
        color: #fff;
    }
    .logo span { color: #007aff; }
    .live-badge {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0,122,255,0.12);
        border: 1px solid rgba(0,122,255,0.25);
        padding: 7px 18px;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 600;
        color: #4da6ff;
        letter-spacing: 1px;
    }
    .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #007aff;
        box-shadow: 0 0 15px #007aff;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(0,122,255,0.7); }
        70% { box-shadow: 0 0 0 15px rgba(0,122,255,0); }
        100% { box-shadow: 0 0 0 0 rgba(0,122,255,0); }
    }
    main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 36px 20px;
        text-align: center;
    }
    .visualizer {
        display: flex;
        align-items: flex-end;
        gap: 5px;
        height: 56px;
        margin-bottom: 32px;
        opacity: 0.5;
        transition: opacity 0.4s;
    }
    .visualizer.active { opacity: 1; }
    .bar {
        width: 7px;
        background: #007aff;
        border-radius: 3px 3px 0 0;
        animation: bounce 1.2s ease-in-out infinite;
        box-shadow: 0 0 8px rgba(0,122,255,0.4);
    }
    .visualizer.active .bar { box-shadow: 0 0 14px rgba(0,122,255,0.7); }
    .bar:nth-child(1) { height: 18px; animation-delay: 0.1s; }
    .bar:nth-child(2) { height: 46px; animation-delay: 0.3s; }
    .bar:nth-child(3) { height: 28px; animation-delay: 0s; }
    .bar:nth-child(4) { height: 56px; animation-delay: 0.2s; }
    .bar:nth-child(5) { height: 36px; animation-delay: 0.4s; }
    @keyframes bounce {
        0%, 100% { transform: scaleY(0.5); }
        50% { transform: scaleY(1); }
    }
    .song-info {
        max-width: 720px;
        width: 100%;
        margin-bottom: 40px;
    }
    #meta {
        font-size: 14px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
        font-weight: 600;
        min-height: 20px;
        transition: color 0.3s;
    }
    #meta.ready { color: #4da6ff; }
    #info {
        font-size: clamp(28px, 4.5vw, 56px);
        font-weight: 900;
        line-height: 1.2;
        color: #fff;
        margin-bottom: 16px;
        text-shadow: 0 0 40px rgba(255,255,255,0.08);
        word-wrap: break-word;
        transition: opacity 0.3s;
    }
    .subtitle {
        color: #666;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .player-section {
        width: 100%;
        max-width: 560px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 24px;
        border-radius: 20px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    audio {
        width: 100%;
        height: 52px;
        border-radius: 10px;
        outline: none;
    }
    audio::-webkit-media-controls-panel { background: #f0f0f8; }
    #lst {
        display: inline-block;
        background: rgba(0,122,255,0.08);
        color: #4da6ff;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid rgba(0,122,255,0.15);
        transition: opacity 0.3s;
    }
    footer {
        padding: 18px;
        text-align: center;
        border-top: 1px solid rgba(255,255,255,0.04);
        margin-top: auto;
    }
    @media (max-width: 640px) {
        header { padding: 16px 18px; flex-direction: column; gap: 12px; }
        .logo { font-size: 18px; }
        .live-badge { font-size: 11px; padding: 5px 14px; }
        .player-section { padding: 16px; border-radius: 14px; width: 95%; }
        main { padding: 24px 10px; }
        .visualizer { height: 40px; margin-bottom: 20px; }
        .bar { width: 5px; }
        .bar:nth-child(2) { height: 32px; }
        .bar:nth-child(4) { height: 40px; }
        .bar:nth-child(5) { height: 26px; }
        #info { font-size: clamp(22px, 6vw, 32px); }
    }
</style>
</head>
<body>

    <header>
        <div class="logo">MEHMET <span>SAM</span></div>
        <div class="live-badge">
            <div class="dot"></div>
            CANLI YAYIN
        </div>
    </header>

    <main>
        <div class="visualizer" id="VZ">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="song-info">
            <div id="meta">Baglaniyor</div>
            <h1 id="info">--</h1>
            <p class="subtitle">SAM RADYO</p>
        </div>

        <div class="player-section">
            <audio id="A" controls preload="auto" playsinline webkit-playsinline></audio>
        </div>
    </main>

    <footer>
        <div id="lst">Dinleyici: --</div>
    </footer>

<script>
(function(){
var A=document.getElementById('A'),I=document.getElementById('info'),
M=document.getElementById('meta'),L=document.getElementById('lst'),
VZ=document.getElementById('VZ');
var FOUND=false,STREAM="";

var SI="";
if(SI){bul(SI+':8000')}else{setTimeout(tara,200)}

function bul(h){
  if(FOUND)return;FOUND=true;
  STREAM='http://'+h+'/stream';
  A.src=STREAM;A.load();
  M.textContent='Hazir, oynat tusuna bas';M.className='ready';
  guncel();setInterval(guncel,3000);
}
function guncel(){
  var s=document.createElement('script');
  s.src=STREAM.replace('/stream','/info.js')+'?_='+Date.now();
  s.onload=function(){
    var d=window.RI||{};
    if(d.s){I.textContent=d.s;M.textContent='SU AN CALIYOR';M.className='ready'}
    if(d.l!=null)L.textContent='Dinleyici: '+d.l;
    try{s.parentNode.removeChild(s)}catch(e){}
  };
  document.head.appendChild(s);
}

function tara(){
  if(FOUND)return;
  var H=['localhost','127.0.0.1'];
  for(var a=1;a<=254;a++){
    H.push('192.168.1.'+a,'192.168.0.'+a,'10.0.0.'+a,
           '192.168.2.'+a,'192.168.10.'+a);
  }
  var idx=0, done=false;

  function bitir(){
    if(done||FOUND)return;done=true;
    M.textContent='Sunucu bulunamadi';
    I.textContent='Telefonda acmak icin PC terminaline bak';
  }
  function dene(ip){
    var s=document.createElement('script');
    s.src='http://'+ip+':8000/info.js?_='+Date.now();
    s.onload=function(){bul(ip+':8000')};
    document.head.appendChild(s);
    var img=new Image();
    img.onload=function(){bul(ip+':8000')};
    img.src='http://'+ip+':8000/ping?_='+Date.now();
  }
  function next(){
    if(FOUND||idx>=H.length){if(!FOUND)bitir();return}
    for(var i=0;i<10&&idx<H.length;i++,idx++)dene(H[idx]);
    setTimeout(next,80);
  }
  setTimeout(function(){if(!FOUND)bitir()},15000);
  next();
}

A.onplay=function(){VZ.classList.add('active')};
A.onpause=function(){VZ.classList.remove('active')};
A.onerror=function(){
  M.textContent='Baglanti koptu, yeniden...';M.className='';
  setTimeout(function(){
    if(STREAM){
      var was=!A.paused;
      var base=STREAM.split('?')[0];
      A.src=base+'?r='+Date.now();A.load();
      if(was)setTimeout(function(){A.play().catch(function(){})},600);
      M.textContent='Yeniden baglandi';M.className='ready';
    }
  },2500);
};

A.volume=0.8;
})();
</script>

</body></html>
