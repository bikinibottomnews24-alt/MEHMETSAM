<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Okul Radyosu | Canlı</title>
<style>
    /* Temel Ayarlar ve Fontlar */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        /* Siyah ve Koyu Mavi Derin Arka Plan */
        background: radial-gradient(circle at 50% 0%, #001a33 0%, #050505 60%, #000000 100%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    /* Üst Menü / Header */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 30px 50px;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 1px;
        color: #ffffff;
    }

    .logo span {
        color: #007aff; /* Okul Mavisi */
    }

    .live-badge {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(0, 122, 255, 0.15);
        border: 1px solid rgba(0, 122, 255, 0.3);
        padding: 8px 20px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 600;
        color: #4da6ff;
        letter-spacing: 1px;
    }

    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #007aff;
        box-shadow: 0 0 15px #007aff;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(0, 122, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); }
    }

    /* Ana İçerik Alanı */
    main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        text-align: center;
        position: relative;
    }

    /* Görselleştirici (Equalizer) Efekti */
    .visualizer {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        height: 60px;
        margin-bottom: 40px;
    }

    .bar {
        width: 8px;
        background: #007aff;
        border-radius: 4px 4px 0 0;
        animation: bounce 1.2s ease-in-out infinite;
        box-shadow: 0 0 10px rgba(0, 122, 255, 0.5);
    }

    .bar:nth-child(1) { height: 20px; animation-delay: 0.1s; }
    .bar:nth-child(2) { height: 50px; animation-delay: 0.3s; }
    .bar:nth-child(3) { height: 30px; animation-delay: 0s; }
    .bar:nth-child(4) { height: 60px; animation-delay: 0.2s; }
    .bar:nth-child(5) { height: 40px; animation-delay: 0.4s; }

    @keyframes bounce {
        0%, 100% { transform: scaleY(0.5); }
        50% { transform: scaleY(1); }
    }

    /* Şarkı Bilgileri */
    .song-info {
        max-width: 800px;
        width: 100%;
        margin-bottom: 50px;
    }

    #meta {
        font-size: 16px;
        color: #888888;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 15px;
        font-weight: 600;
    }

    #info {
        font-size: clamp(32px, 5vw, 64px); /* Ekran boyutuna göre büyüyüp küçülür */
        font-weight: 900;
        line-height: 1.2;
        color: #ffffff;
        margin-bottom: 20px;
        text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        word-wrap: break-word;
    }

    .subtitle {
        color: #777777;
        font-size: 16px;
        font-weight: 400;
    }

    /* Oynatıcı ve Alt Kontroller */
    .player-section {
        width: 100%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 30px;
        border-radius: 24px;
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    audio {
        width: 100%;
        height: 54px;
        border-radius: 12px;
        outline: none;
    }

    /* Chrome/Safari Ses Oynatıcı Özelleştirmesi */
    audio::-webkit-media-controls-panel {
        background-color: #ffffff;
    }

    /* Dinleyici Sayısı / Footer */
    footer {
        padding: 20px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: auto;
    }

    #lst {
        display: inline-block;
        background: rgba(0, 122, 255, 0.1);
        color: #4da6ff;
        padding: 8px 16px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        border: 1px solid rgba(0, 122, 255, 0.2);
    }

    /* Mobil Uyumluluk */
    @media (max-width: 768px) {
        header { padding: 20px; flex-direction: column; gap: 15px; }
        .player-section { padding: 20px; border-radius: 16px; width: 90%; }
        main { padding: 20px 10px; }
    }
</style>
</head>
<body>

    <header>
        <div class="logo">MEHMET <span>ŞAM</span></div>
        <div class="live-badge">
            <div class="dot"></div>
            CANLI YAYIN
        </div>
    </header>

    <main>
        <div class="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="song-info">
            <div id="meta">Sunucu Taranıyor...</div>
            <h1 id="info">Bağlantı Bekleniyor</h1>
            <p class="subtitle">ŞAMRADYO</p>
        </div>

        <div class="player-section">
            <audio id="audio" controls preload="none"></audio>
        </div>
    </main>

    <footer>
        <div id="lst">Dinleyici: Hesaplanıyor...</div>
    </footer>

<script>
var A=document.getElementById('audio'),I=document.getElementById('info'),
M=document.getElementById('meta'),L=document.getElementById('lst');
var FOUND=false, STREAM="";

var SUBNETS=['localhost','127.0.0.1']; for(var a=1;a<=254;a++){
  SUBNETS.push('192.168.1.'+a);SUBNETS.push('192.168.0.'+a);
  SUBNETS.push('10.0.0.'+a);
}
var tried=0;
function tara(){
  if(FOUND||tried>=SUBNETS.length)return;
  for(var i=0;i<15&&tried<SUBNETS.length;i++,tried++){
    (function(ip){
      var s=document.createElement('script');
      s.src='http://'+ip+':8000/info.js?_='+Date.now();
      s.onload=function(){bul(ip+':8000')};
      document.head.appendChild(s);
    })(SUBNETS[tried]);
  }
  if(!FOUND)setTimeout(tara,200);
}
function bul(host){
  if(FOUND)return;
  FOUND=true;STREAM='http://'+host+'/stream';
  A.src=STREAM;M.textContent='Bağlantı Kuruldu! Play\'e Basın';guncel();
  setInterval(guncel,3000);
}
function guncel(){
  var s=document.createElement('script');
  s.src=STREAM.replace('/stream','/info.js')+'?_='+Date.now();
  s.onload=function(){
    var d=window.RI||{};
    if(d.s){I.textContent=d.s;M.textContent='ŞU AN ÇALIYOR'}
    if(d.l!=null)L.textContent='Yayındaki Dinleyici: '+d.l;
  };
  document.head.appendChild(s);
}
A.onerror=function(){
  setTimeout(function(){if(STREAM){A.src=STREAM+'?r='+Date.now()}},3000);
};
setTimeout(function(){if(!FOUND){tara()}},800);
</script>

</body>
</html>
