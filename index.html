<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>MEHMET SAM | Okul Radyosu</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 50% 0%, #001a33 0%, #050505 60%, #000 100%);
        color: #fff;
        min-height: 100vh; min-height: 100dvh;
        display: flex;
        flex-direction: column;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 36px;
        background: rgba(0,0,0,0.25);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: 1.5px; color: #fff; }
    .logo span { color: #007aff; }
    .live-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(0,122,255,0.12);
        border: 1px solid rgba(0,122,255,0.25);
        padding: 6px 16px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 600;
        color: #4da6ff;
        letter-spacing: 1px;
    }
    .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #007aff;
        box-shadow: 0 0 12px #007aff;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(0,122,255,0.7); }
        70% { box-shadow: 0 0 0 12px rgba(0,122,255,0); }
        100% { box-shadow: 0 0 0 0 rgba(0,122,255,0); }
    }
    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px 16px; text-align: center; }
    .visualizer { display: flex; align-items: flex-end; gap: 4px; height: 44px; margin-bottom: 24px; opacity: 0.5; transition: opacity 0.4s; }
    .visualizer.active { opacity: 1; }
    .bar { width: 6px; background: #007aff; border-radius: 3px 3px 0 0; animation: bounce 1.2s ease-in-out infinite; box-shadow: 0 0 6px rgba(0,122,255,0.4); }
    .visualizer.active .bar { box-shadow: 0 0 12px rgba(0,122,255,0.7); }
    .bar:nth-child(1) { height: 14px; animation-delay: 0.1s; }
    .bar:nth-child(2) { height: 36px; animation-delay: 0.3s; }
    .bar:nth-child(3) { height: 22px; animation-delay: 0s; }
    .bar:nth-child(4) { height: 44px; animation-delay: 0.2s; }
    .bar:nth-child(5) { height: 28px; animation-delay: 0.4s; }
    @keyframes bounce { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
    .song-info { max-width: 600px; width: 100%; margin-bottom: 28px; }
    #meta { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 600; min-height: 18px; transition: color 0.3s; }
    #meta.ready { color: #4da6ff; }
    #info { font-size: clamp(24px, 4vw, 48px); font-weight: 900; line-height: 1.2; color: #fff; margin-bottom: 12px; text-shadow: 0 0 30px rgba(255,255,255,0.08); word-wrap: break-word; }
    .subtitle { color: #666; font-size: 12px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
    .player-section { width: 100%; max-width: 500px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); padding: 18px; border-radius: 16px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    audio { width: 100%; height: 48px; border-radius: 8px; outline: none; }
    audio::-webkit-media-controls-panel { background: #f0f0f8; }
    #url { display: none; margin-top: 16px; padding: 18px 20px; background: #007aff; border-radius: 16px; font-size: 18px; font-weight: 800; text-align: center; box-shadow: 0 8px 32px rgba(0,122,255,0.4); -webkit-tap-highlight-color: transparent; }
    #url a { display: block; color: #fff; text-decoration: none; word-break: break-all; }
    #url span { display: block; font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 500; margin-top: 6px; }
    footer { padding: 14px; text-align: center; border-top: 1px solid rgba(255,255,255,0.04); }
    #lst { display: inline-block; background: rgba(0,122,255,0.08); color: #4da6ff; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid rgba(0,122,255,0.15); }
    @media (max-width: 480px) {
        header { padding: 14px 16px; flex-direction: column; gap: 8px; }
        .logo { font-size: 16px; }
        .live-badge { font-size: 10px; padding: 4px 12px; }
        .player-section { padding: 12px; width: 98%; }
        main { padding: 16px 8px; }
        .visualizer { height: 32px; margin-bottom: 16px; }
        .bar { width: 5px; }
        .bar:nth-child(2) { height: 26px; }
        .bar:nth-child(4) { height: 32px; }
        .bar:nth-child(5) { height: 20px; }
        #info { font-size: clamp(18px, 5vw, 28px); }
    }
</style>
</head>
<body>
    <header>
        <div class="logo">MEHMET <span>SAM</span></div>
        <div class="live-badge"><div class="dot"></div>CANLI YAYIN</div>
    </header>
    <main>
        <div class="visualizer" id="VZ">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="song-info">
            <div id="meta">Baglaniyor</div>
            <h1 id="info">--</h1>
            <p class="subtitle">SAM RADYO</p>
        </div>
        <div class="player-section">
            <audio id="A" controls preload="auto" playsinline webkit-playsinline></audio>
            <div id="url"></div>
        </div>
    </main>
    <footer>
        <div id="lst">Dinleyici: --</div>
    </footer>
<script>
(function(){
var A=document.getElementById('A'),I=document.getElementById('info'),
M=document.getElementById('meta'),L=document.getElementById('lst'),
VZ=document.getElementById('VZ'),U=document.getElementById('url');
var F=false,S="",_q=0;
var SI="192.168.1.39";
var isPC=!/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Tablet/i.test(navigator.userAgent);

function u(u,t){U.style.display='block';U.innerHTML='<a href="'+u+'" target="_blank">'+u+'</a><span>'+t+'</span>';}

function g(){setTimeout(function(){
var s=document.createElement('script');
s.src=S.replace('/stream','/info.js')+'?_='+Date.now();
s.onload=function(){var d=window.RI||{};if(d.s){I.textContent=d.s;M.textContent='SU AN CALIYOR';M.className='ready'}if(d.l!=null)L.textContent='Dinleyici: '+d.l;if(d.q!=null)_q=d.q;try{s.parentNode.removeChild(s)}catch(e){}};
document.head.appendChild(s);},500);setInterval(function(){
var s=document.createElement('script');
s.src=S.replace('/stream','/info.js')+'?_='+Date.now();
s.onload=function(){var d=window.RI||{};if(d.s)I.textContent=d.s;if(d.l!=null)L.textContent='Dinleyici: '+d.l;if(d.q!=null&&d.q!==_q){_q=d.q;var b=S.split('?')[0];A.src=b+'?r='+Date.now();A.load();A.play().catch(function(){})}try{s.parentNode.removeChild(s)}catch(e){}};
document.head.appendChild(s);},3000)}

function bas(ip){
if(F)return;F=true;S='http://'+ip+':8000/stream';
A.src=S;A.load();M.textContent='Baglaniyor...';U.style.display='none';
if(!isPC)setTimeout(function(){if(!F)return;if(A.readyState===0){u('http://'+ip+':8000/','Radyoyu acmak icin tikla');M.textContent='Baglanti yok';I.textContent='Radyoyu ac';}},3000);
g();}

function tara(){
if(F)return;
var H=['localhost','127.0.0.1'];
for(var a=1;a<=254;a++)H.push('192.168.1.'+a,'192.168.0.'+a,'10.0.0.'+a,'192.168.2.'+a,'192.168.10.'+a);
var k=0,z=false;
function bit(){if(z||F)return;z=true;if(!isPC&&SI)u('http://'+SI+':8000/','Radyoyu acmak icin tikla');M.textContent=SI?'Baglanti yok':'Radyo kapali';if(!SI)I.textContent='python sec.py calistir';}
function de(ip,t){t.onloadeddata=function(){if(!F)bas(ip)};t.src='http://'+ip+':8000/stream';t.load();}
function next(){if(F||k>=H.length){if(!F)bit();return}for(var i=0;i<8&&k<H.length;i++,k++)de(H[k],new Audio());setTimeout(next,1500);}
setTimeout(function(){if(!F)bit()},isPC?12000:6000);
next();}

if(window.location.protocol==='file:'){
  if(!isPC&&SI){bas(SI)}
  else if(!isPC){M.textContent='Radyo kapali';I.textContent='Telefonda http:// adresini kullan';if(!SI){M.textContent='Radyo kapali';I.textContent='Once pc de python sec.py calistir'}}
  else if(SI){bas(SI)}
  else{M.textContent='Radyo araniyor...';tara()}
} else if(SI){
  bas(SI)
} else {
  setTimeout(tara,200)
}

A.onplay=function(){VZ.classList.add('active')};
A.onpause=function(){VZ.classList.remove('active')};
A.onerror=function(){
if(A.readyState===0&&S){if(!isPC){u(S.replace('/stream','')+'/','Adrese tikla');M.textContent='Adrese tikla'}return}
setTimeout(function(){if(S){var w=!A.paused;var b=S.split('?')[0];A.src=b+'?r='+Date.now();A.load();if(w)setTimeout(function(){A.play().catch(function(){})},600);}},2500);};
A.volume=0.8;
})();
</script>
</body></html>
