<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Okul Radyo</title>
<style>
*{margin:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0b0f1a;color:#e9ecff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:rgba(255,255,255,.05);border-radius:20px;padding:30px;max-width:460px;width:100%;text-align:center}
h1{font-size:26px;margin-bottom:6px}
.sub{color:#888;font-size:14px;margin-bottom:20px}
.status{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
.dot{width:10px;height:10px;border-radius:50%;background:#ff2d55;animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,45,85,.7)}70%{box-shadow:0 0 0 12px rgba(255,45,85,0)}100%{box-shadow:0 0 0 0 rgba(255,45,85,0)}}
#info{font-size:18px;font-weight:600;margin-bottom:8px}
#meta{color:#888;font-size:13px;margin-bottom:25px}
audio{width:100%;margin-bottom:15px}
#lst{color:#666;font-size:12px}
</style>
</head>
<body>
<div class="card">
<div class="status"><span class="dot"></span><span>CANLI YAYIN</span></div>
<h1>Okul Radyo</h1>
<div class="sub">DJ'in sectigi sarki herkeste ayni anda calar</div>
<div id="info">Araniyor...</div>
<div id="meta">Sunucu taranıyor</div>
<audio id="audio" controls preload="none"></audio>
<div id="lst">-</div>
</div>
<script>
var A=document.getElementById('audio'),I=document.getElementById('info'),
M=document.getElementById('meta'),L=document.getElementById('lst');
var FOUND=false, STREAM="";

var SUBNETS=['localhost','127.0.0.1']; for(var a=1;a<=254;a++){
  SUBNETS.push('192.168.1.'+a);SUBNETS.push('192.168.0.'+a);
  SUBNETS.push('10.0.0.'+a);
}
var tried=0;
function tara(){
  if(FOUND||tried>=SUBNETS.length)return;
  for(var i=0;i<15&&tried<SUBNETS.length;i++,tried++){
    (function(ip){
      var s=document.createElement('script');
      s.src='http://'+ip+':8000/info.js?_='+Date.now();
      s.onload=function(){bul(ip+':8000')};
      document.head.appendChild(s);
    })(SUBNETS[tried]);
  }
  if(!FOUND)setTimeout(tara,200);
}
function bul(host){
  if(FOUND)return;
  FOUND=true;STREAM='http://'+host+'/stream';
  A.src=STREAM;M.textContent='Bulundu! Playe bas';guncel();
  setInterval(guncel,3000);
}
function guncel(){
  var s=document.createElement('script');
  s.src=STREAM.replace('/stream','/info.js')+'?_='+Date.now();
  s.onload=function(){
    var d=window.RI||{};
    if(d.s){I.textContent=d.s;M.textContent='Calıyor'}
    if(d.l!=null)L.textContent='Dinleyici: '+d.l;
  };
  document.head.appendChild(s);
}
A.onerror=function(){
  setTimeout(function(){if(STREAM){A.src=STREAM+'?r='+Date.now()}},3000);
};
setTimeout(function(){if(!FOUND){tara()}},800);
</script>
</body></html>
